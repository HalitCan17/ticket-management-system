spring.application.name=ticket-management-system
spring.datasource.url=jdbc:postgresql://localhost:5433/ticketdb
spring.datasource.username=ticketuser
spring.datasource.password=ticketpass

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.jpa.open-in-view=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/ticket-realm

# --- MULTIPART (FILE UPLOAD) CONFIGURATION ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.storage.upload-dir=uploads/tickets

# jBPM (KIE Server) Ba?lant? Ayarlar?
jbpm.server.url=http://localhost:8082/kie-server/services/rest/server
jbpm.server.user=wbadmin
jbpm.server.password=wbadmin
jbpm.container.id=ticket-management_1.0.0-SNAPSHOT
jbpm.process.id=ticket-management.ticket-process